name: Taisyaku PDF Processor
on:
  schedule:
    - cron: "0,30 2 * * 1-5"       # JST 11:00, 11:30
    - cron: "0,30 7-8 * * 1-5"     # JST 16:00, 16:30, 17:00, 17:30
  workflow_dispatch:
    inputs:
      pdf_urls:
        description: 'カンマ区切りのPDF URL'
        required: false
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install httpx pdfplumber pdf2image pillow anthropic jpholiday
      - name: Skip on Japanese holidays
        id: holiday_check
        run: |
          python -c "
          import datetime, jpholiday, sys
          today = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          if jpholiday.is_holiday(today.date()):
              print('skip=true')
              sys.exit(0)
          print('skip=false')
          " >> $GITHUB_OUTPUT
      - name: Process PDFs
        if: steps.holiday_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          FTP_HOST:          ${{ secrets.FTP_HOST }}
          FTP_USER:          ${{ secrets.FTP_USER }}
          FTP_PASS:          ${{ secrets.FTP_PASS }}
          FTP_REMOTE_PATH:   ${{ secrets.FTP_REMOTE_PATH }}
          PDF_URLS:          ${{ github.event.inputs.pdf_urls }}
        run: python scripts/process_pdf.py
