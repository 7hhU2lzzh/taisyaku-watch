name: Taisyaku PDF Processor

on:
  schedule:
    - cron: "*/10 23-11 * * 0-4"
  workflow_dispatch:
    inputs:
      pdf_urls:
        description: 'カンマ区切りのPDF URL'
        required: false

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get install -y poppler-utils
          pip install httpx pdfplumber pdf2image pillow anthropic

      - name: Process PDFs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          FTP_HOST:          ${{ secrets.FTP_HOST }}
          FTP_USER:          ${{ secrets.FTP_USER }}
          FTP_PASS:          ${{ secrets.FTP_PASS }}
          FTP_REMOTE_PATH:   ${{ secrets.FTP_REMOTE_PATH }}
          PDF_URLS:          ${{ github.event.inputs.pdf_urls }}
        run: python scri
